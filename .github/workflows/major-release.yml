name: Major version release

on:
  push:
    tags:
      - 'v*.*.0'

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release for major version tags
    runs-on: ubuntu-latest

    steps:
      - name: Check tag shape
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.0$ ]]; then
            echo "Tag $TAG is not a major version milestone tag. Skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        if: steps.tag.outputs.publish == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes from changelog
        if: steps.tag.outputs.publish == 'true'
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          NOTES_FILE="/tmp/haxjobs-release-notes.md"

          python3 - <<'PY' > "$NOTES_FILE"
          from pathlib import Path
          import os
          import re

          version = os.environ["VERSION"]
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")

          pattern = re.compile(
              rf"^##\s+{re.escape(version)}(?:\s+[^\n]*)?\n(?P<body>.*?)(?=^##\s+\d+\.\d+\.\d+|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(changelog)

          if match:
              body = match.group("body").strip()
          else:
              body = "No dedicated CHANGELOG section was found for this version yet."

          print(f"# HaxJobs v{version}\n")
          print(body)
          print("\n---\n")
          print("This release was published automatically from a major version tag matching `vX.Y.0`.")
          PY
        env:
          VERSION: ${{ steps.tag.outputs.version }}

      - name: Publish release
        if: steps.tag.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "HaxJobs ${GITHUB_REF_NAME}" \
            --notes-file /tmp/haxjobs-release-notes.md \
            --verify-tag
