  task: Implement the minimal Vue 3 + Vite + TypeScript frontend and FastAPI backend
    evidence-first slice with a shared deterministic Python service layer, CLI wrapper,
    API endpoints, fixture-based tests, and Markdown/JSON reporting.
  result: success
  changes: Scaffolded a new Python runtime package under app/ with Pydantic schemas,
    deterministic CV/JD parsing, evidence mapping, Markdown reporting, FastAPI endpoints,
    and a thin CLI wrapper. Added backend pytest coverage for PDF/TXT parsing, workflow
    analysis, reporting, and API endpoints. Scaffolded a Vue 3 + Vite + TypeScript
    single-page frontend under web/ with upload, JD paste, analysis, results, and
    JSON/Markdown download flows, plus Vitest coverage and production build support.
  decisions: Kept the slice stateless and deterministic with no database, auth, or
    model calls. Used pdftotext for PDF extraction, .env file inspection for llm_configured,
    and one shared workflow function so CLI and API behavior stay aligned.
  risks: The deterministic matcher is heuristic and intentionally conservative, so
    some JD requirements may be over-broad or under-matched until later slices refine
    requirement classification. Full browser-driven manual acceptance was not run
    in this session; verification relied on pytest, Vitest, Vite build, and a CLI
    fixture run.
