# HaxJobs configuration
# Canonical defaults. Environment variables override any value.
# Edit this file, never hardcode paths in scripts.

[paths]
# Root — everything derives from here
home = "/home/hax/haxjobs-private-dev"

[paths.state]
dir = "state"
db = "haxjobs.db"
log = "pipeline.log"

[paths.runtime]
intake = "intake"
packs = "packs"
reports = "reports"
outreach = "outreach"

[paths.profile]
dir = "profile"
local = "arinze_profile.local.json"
cv_typed = "cv_profile.typed.json"

[paths.registry]
cv_variants = "cv_variants/registry.json"

[paths.dashboard]
dir = "dashboard"

[email]
imap_host = "imap.gmail.com"
imap_port = 993
address = "archilleshaxsys@gmail.com"
allowed_senders = ["elenasuluarinze@gmail.com", "pentacker@gmail.com"]

[telegram]
chat_id = "-1003991695885"
thread_id = 18

# ── User profile (drives evaluation prompts and pack generation) ──

[user]
name = "Arinze Elenasulu"
location = "London, UK"
headline = "Python Backend Engineer | AI & Automation"

# ── Job search preferences (drives discovery filtering and classification) ──

[job_search]
preferred_locations = ["London", "Remote UK", "Manchester", "Leeds"]
work_modes = ["remote", "hybrid", "onsite"]
employment_types = ["full_time", "contract", "graduate"]
target_levels = ["graduate", "junior", "mid"]
excluded_levels = ["senior", "lead", "principal", "staff", "manager"]
blacklisted_companies = []
blacklisted_keywords = ["sales", "marketing", "legal", "finance", "admin"]
lenient_filtering = true

[discovery]
# Greenhouse companies to scrape (board slugs)
greenhouse_companies = [
    "datadog",
    "cloudflare",
]

# ── Role families (drives classification — matches CV variants 1:1) ──

[[roles]]
id = "backend_python"
label = "Python Backend Engineer"
cv_variant = "backend_python"
priority = 1
titles = [
    "Python Developer", "Python Engineer",
    "Backend Developer", "Backend Engineer", "Back End Developer", "Back End Engineer",
    "FastAPI Developer", "API Engineer", "Django Developer", "Flask Developer",
    "Software Engineer, Backend", "Backend Software Engineer",
]
positive_keywords = [
    "python", "fastapi", "django", "flask", "backend", "back end",
    "api", "rest", "sqlalchemy", "postgresql", "postgres", "redis",
    "asyncio", "pydantic", "microservices",
